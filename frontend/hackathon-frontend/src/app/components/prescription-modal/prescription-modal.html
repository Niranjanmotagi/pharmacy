<div class="bb-modal-backdrop" *ngIf="show" (click)="closeModal()"></div>
<div class="bb-modal bb-rx-modal" *ngIf="show" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
  <div class="bb-modal-header">
    <div>
      <h5 class="mb-0">Prescription</h5>
      <small class="text-muted">{{ orderNumber }}</small>
    </div>
    <div class="d-flex gap-1 align-items-center">
      <ng-container *ngIf="!isPdf && objectUrl">
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="zoomOut()" aria-label="Zoom out">−</button>
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="zoomReset()">{{ (zoom * 100) | number:'1.0-0' }}%</button>
        <button type="button" class="btn btn-sm btn-outline-secondary" (click)="zoomIn()" aria-label="Zoom in">+</button>
      </ng-container>
      <button type="button" class="btn btn-sm btn-outline-secondary" [disabled]="!objectUrl" (click)="download()">Download</button>
      <button type="button" class="btn-close ms-1" aria-label="Close" (click)="closeModal()"></button>
    </div>
  </div>

  <div class="bb-modal-body bb-rx-body">
    <div *ngIf="loading" class="text-center text-muted py-5">
      <div class="spinner-border text-success"></div>
      <div class="mt-2 small">Loading prescription...</div>
    </div>

    <div *ngIf="errorMessage && !loading" class="alert alert-danger m-3">
      {{ errorMessage }}
    </div>

    <div class="bb-rx-image-wrap" *ngIf="!loading && !errorMessage && objectUrl && !isPdf">
      <img
        [src]="objectUrl"
        [style.transform]="'scale(' + zoom + ')'"
        alt="Prescription"
      />
    </div>

    <iframe
      *ngIf="!loading && !errorMessage && safePdfUrl && isPdf"
      [src]="safePdfUrl"
      class="bb-rx-pdf"
      title="Prescription PDF"
    ></iframe>
  </div>
</div>
