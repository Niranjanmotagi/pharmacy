<nav class="navbar bb-navbar mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand bb-brand" routerLink="/medicines" (click)="close()">
      <span class="bb-brand-mark">Rx</span>
      <span class="bb-brand-name">ByteBrigade <span>Pharmacy</span></span>
    </a>

    <button
      type="button"
      class="bb-burger"
      [class.is-open]="open()"
      [attr.aria-expanded]="open()"
      aria-label="Toggle navigation"
      (click)="toggle()"
    >
      <span></span><span></span><span></span>
    </button>

    <div class="bb-collapse" [class.is-open]="open()">
      <ul class="bb-nav">
        <li>
          <a class="bb-link" routerLink="/medicines" routerLinkActive="active" (click)="close()">Medicines</a>
        </li>

        <ng-container *ngIf="auth.isLoggedIn() && !auth.isAdmin()">
          <li>
            <a class="bb-link" routerLink="/cart" routerLinkActive="active" (click)="close()">Cart</a>
          </li>
          <li>
            <a class="bb-link" routerLink="/orders" routerLinkActive="active" (click)="close()">My Orders</a>
          </li>
          <li>
            <a class="bb-link" routerLink="/profile" routerLinkActive="active" (click)="close()">Profile</a>
          </li>
        </ng-container>

        <ng-container *ngIf="auth.isAdmin()">
          <li>
            <a class="bb-link" routerLink="/dashboard" routerLinkActive="active" (click)="close()">Dashboard</a>
          </li>
          <li>
            <a class="bb-link" routerLink="/add-medicine" routerLinkActive="active" (click)="close()">Add Medicine</a>
          </li>
          <li>
            <a class="bb-link" routerLink="/admin-orders" routerLinkActive="active" (click)="close()">All Orders</a>
          </li>
        </ng-container>
      </ul>

      <div class="bb-account">
        <ng-container *ngIf="auth.isLoggedIn(); else loginLinks">
          <span class="bb-user-chip">
            <span class="bb-user-avatar">{{ (auth.getUsername() || '?').charAt(0).toUpperCase() }}</span>
            <span class="bb-user-meta">
              <small>Signed in as</small>
              <strong>{{ auth.getUsername() }}</strong>
            </span>
            <span class="bb-user-role">{{ auth.getRole() }}</span>
          </span>
          <button type="button" class="btn btn-outline-light btn-sm" (click)="logout()">Logout</button>
        </ng-container>
        <ng-template #loginLinks>
          <a class="bb-link" routerLink="/login" (click)="close()">Login</a>
          <a class="btn btn-light btn-sm" routerLink="/register" (click)="close()">Sign Up</a>
        </ng-template>
      </div>
    </div>
  </div>
</nav>
