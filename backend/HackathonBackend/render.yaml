# Render service blueprint. Push this to GitHub, then in Render:
#   New + → Blueprint → connect repo → Render reads this file automatically.
services:
  - type: web
    name: bytebrigade-api
    runtime: docker
    region: oregon            # change to your nearest region
    plan: free                # free tier works for hackathon demos
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /openapi/v1.json
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      # JWT__KEY: any long random string (32+ chars). Used to sign tokens.
      - key: JWT__KEY
        sync: false

      # DEFAULT_CONNECTION: your Neon Postgres URL.
      # Example:
      #   postgresql://USER:PASS@ep-cool-name.eu-west-1.aws.neon.tech/neondb?sslmode=require
      - key: DEFAULT_CONNECTION
        sync: false

      # Comma-separated allowed front-end origins for CORS.
      # e.g. "https://bytebrigade-pharmacy.vercel.app"
      - key: CORS__ALLOWEDORIGINS
        sync: false
